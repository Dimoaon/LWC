<template>
    <div class="company-employees">
        <div lwc:dom="manual" class="custom-css-container"></div>

        <div class="header">
            <div class="heading">{heading}</div>
            <div class="description">{description}</div>
        </div>

        <template lwc:if={isAddEmployeeOpen}>
            <div class="employee-form">
                <div class="employee-form__grid">
                    <div class="employee-form__field">
                        <lightning-input
                            type="text"
                            label={fullNameLabel}
                            name="fullName"
                            value={employeeForm.fullName}
                            required
                            maxlength={maxLength.fullName}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="employee-form__field">
                        <lightning-input
                            type="email"
                            label={emailLabel}
                            name="email"
                            value={employeeForm.email}
                            required
                            maxlength={maxLength.email}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="employee-form__field">
                        <lightning-input
                            type="text"
                            label={roleTitleLabel}
                            name="roleTitle"
                            value={employeeForm.roleTitle}
                            required
                            maxlength={maxLength.roleTitle}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="employee-form__field">
                        <lightning-input
                            type="text"
                            label={departmentLabel}
                            name="department"
                            value={employeeForm.department}
                            required
                            maxlength={maxLength.department}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="employee-form__field">
                        <lightning-input
                            type="date"
                            label={startDateLabel}
                            name="startDate"
                            value={employeeForm.startDate}
                            required
                            max={maxStartDate}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="employee-form__field">
                        <lightning-input
                            type="tel"
                            label={phoneLabel}
                            name="phone"
                            value={employeeForm.phone}
                            required
                            maxlength={maxLength.phone}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="employee-form__field">
                        <lightning-input
                            type="text"
                            label={statusLabel}
                            name="status"
                            value={employeeForm.status}
                            required
                            maxlength={maxLength.status}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="employee-form__field employee-form__field--full">
                        <lightning-textarea
                            label={notesLabel}
                            name="notes"
                            value={employeeForm.notes}
                            maxlength={maxLength.notes}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-textarea>
                    </div>
                </div>

                <div class="employee-form__actions">
                    <lightning-button
                        label={cancelButtonLabel}
                        variant="neutral"
                        onclick={handleCloseAddEmployee}
                    ></lightning-button>
                    <lightning-button
                        label={saveButtonLabel}
                        variant="brand"
                        onclick={handleAddEmployee}
                        disabled={isSaveDisabled}
                    ></lightning-button>
                </div>
            </div>
        </template>

        <template lwc:else>
            <div class="company-section">
                <div class="company-section__header">
                    <div class="company-section__title">{companySectionTitle}</div>
                    <div class="company-section__description">{companySectionDescription}</div>
                </div>

                <div class="company-grid">
                    <template for:each={companyFields} for:item="field">
                        <div key={field.id} class="company-field">
                            <div class="company-field__label">{field.label}</div>
                            <div class="company-field__value">{field.value}</div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="employees-card slds-card">
                <div class="employees-card__header slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                    <div class="employees-toolbar__title">{employeesSectionTitle}</div>
                    <lightning-button
                        label={addEmployeeButtonLabel}
                        variant="brand"
                        onclick={handleOpenAddEmployee}
                    ></lightning-button>
                </div>

                <div class="employees-table">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered slds-table_fixed-layout slds-max-medium-table_stacked-horizontal">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col">
                                        <div class="slds-truncate" title={fullNameLabel}>{fullNameLabel}</div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-truncate" title={roleTitleLabel}>{roleTitleLabel}</div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-truncate" title={departmentLabel}>{departmentLabel}</div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-truncate" title={emailLabel}>{emailLabel}</div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-truncate" title={phoneLabel}>{phoneLabel}</div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-truncate" title={statusLabel}>{statusLabel}</div>
                                    </th>
                                    <th scope="col">
                                        <div class="slds-truncate" title={notesLabel}>{notesLabel}</div>
                                    </th>
                                    <th scope="col" class="employees-table__actions">
                                        <div title={labels.actionsTitle}>{labels.actionsTitle}</div>
                                    </th>
                                </tr>
                            </thead>
                        <tbody>
                            <template lwc:if={hasEmployees}>
                                <template for:each={employees} for:item="employee">
                                    <tr key={employee.id}>
                                        <td data-label={fullNameLabel}>
                                            <div class="slds-truncate" title={employee.fullName}>{employee.fullName}</div>
                                        </td>
                                        <td data-label={roleTitleLabel}>
                                            <div class="slds-truncate" title={employee.roleTitle}>{employee.roleTitle}</div>
                                        </td>
                                        <td data-label={departmentLabel}>
                                            <div class="slds-truncate" title={employee.department}>{employee.department}</div>
                                        </td>
                                        <td data-label={emailLabel}>
                                            <div class="slds-truncate" title={employee.email}>{employee.email}</div>
                                        </td>
                                        <td data-label={phoneLabel}>
                                            <div class="slds-truncate" title={employee.phone}>{employee.phone}</div>
                                        </td>
                                        <td data-label={statusLabel}>
                                            <div class="slds-truncate" title={employee.status}>{employee.status}</div>
                                        </td>
                                        <td data-label={notesLabel}>
                                            <div class="employees-table__notes slds-truncate" title={employee.notes}>{employee.notes}</div>
                                        </td>
                                        <td data-label={labels.actionsTitle} class="employees-table__actions">
                                            <div class="action__wrapper">
                                                <lightning-button-icon
                                                icon-name="utility:edit"
                                                alternative-text={labels.editActionTitle}
                                                title={labels.editActionTitle}
                                                variant="border-filled"
                                                data-id={employee.id}
                                                onclick={handleEditEmployee}
                                            ></lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:delete"
                                                alternative-text={labels.deleteActionTitle}
                                                title={labels.deleteActionTitle}
                                                variant="border-filled"
                                                data-id={employee.id}
                                                onclick={handleDeleteEmployee}
                                            ></lightning-button-icon>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </template>

                            <template lwc:else>
                                <tr class="employees-table__empty-row">
                                    <td colspan="8" class="employees-table__empty-cell">
                                        <div class="empty-state-message">{emptyStateTitle}</div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </template>
    </div>
</template>
