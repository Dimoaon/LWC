<template>
    <div class="company-employees company-employees__wrapper">
        <div lwc:dom="manual" class="company-employees__custom-css-container"></div>

        <div class="company-employees__header">
            <div class="company-employees__heading">{heading}</div>
            <div class="company-employees__description">{description}</div>
        </div>

        <template lwc:if={isAddEmployeeOpen}>
            <div class="company-employees__employee-form">
                <div class="company-employees__employee-form-grid">
                    <div class="company-employees__employee-form-field">
                        <lightning-input
                            type="text"
                            label={fullNameLabel}
                            name="fullName"
                            value={employeeForm.fullName}
                            required
                            maxlength={maxLength.fullName}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="company-employees__employee-form-field">
                        <lightning-input
                            type="email"
                            label={emailLabel}
                            name="email"
                            value={employeeForm.email}
                            required
                            maxlength={maxLength.email}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="company-employees__employee-form-field">
                        <lightning-input
                            type="text"
                            label={roleTitleLabel}
                            name="roleTitle"
                            value={employeeForm.roleTitle}
                            required
                            maxlength={maxLength.roleTitle}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="company-employees__employee-form-field">
                        <lightning-input
                            type="text"
                            label={departmentLabel}
                            name="department"
                            value={employeeForm.department}
                            required
                            maxlength={maxLength.department}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="company-employees__employee-form-field">
                        <lightning-input
                            type="date"
                            label={startDateLabel}
                            name="startDate"
                            value={employeeForm.startDate}
                            required
                            max={maxStartDate}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="company-employees__employee-form-field">
                        <lightning-input
                            type="tel"
                            label={phoneLabel}
                            name="phone"
                            value={employeeForm.phone}
                            required
                            maxlength={maxLength.phone}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="company-employees__employee-form-field">
                        <lightning-input
                            type="text"
                            label={statusLabel}
                            name="status"
                            value={employeeForm.status}
                            required
                            maxlength={maxLength.status}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-input>
                    </div>

                    <div class="company-employees__employee-form-field company-employees__employee-form-field--full">
                        <lightning-textarea
                            label={notesLabel}
                            name="notes"
                            value={employeeForm.notes}
                            maxlength={maxLength.notes}
                            onchange={handleEmployeeFieldChange}
                        ></lightning-textarea>
                    </div>
                </div>

                <div class="company-employees__employee-form-actions">
                    <lightning-button
                        label={cancelButtonLabel}
                        variant="neutral"
                        onclick={handleCloseAddEmployee}
                    ></lightning-button>
                    <lightning-button
                        label={saveButtonLabel}
                        variant="brand"
                        onclick={handleAddEmployee}
                        disabled={isSaveDisabled}
                    ></lightning-button>
                </div>
            </div>
        </template>

        <template lwc:else>
            <div class="company-employees__company-section">
                <div class="company-employees__company-section-header">
                    <div class="company-employees__company-section-title">{companySectionTitle}</div>
                    <div class="company-employees__company-section-description">{companySectionDescription}</div>
                </div>

                <div class="company-employees__company-grid">
                    <template for:each={companyFields} for:item="field">
                        <div key={field.id} class="company-employees__company-field">
                            <div class="company-employees__company-field-label">{field.label}</div>
                            <div class="company-employees__company-field-value">{field.value}</div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="company-employees__employees-card slds-card">
                <div class="company-employees__employees-card-header slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                    <div class="company-employees__employees-toolbar-title">{employeesSectionTitle}</div>
                    <lightning-button
                        label={addEmployeeButtonLabel}
                        variant="brand"
                        onclick={handleOpenAddEmployee}
                    ></lightning-button>
                </div>

                <div class="company-employees__employees-table">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered slds-table_fixed-layout slds-max-medium-table_stacked-horizontal">
                        <thead>
                                <tr class="slds-line-height_reset">
                                    <template for:each={employeeTableColumns} for:item="column">
                                    <th key={column.id} scope="col" class={column.headerClass}>
                                        <div class="slds-truncate" title={column.label}>{column.label}</div>
                                    </th>
                                </template>
                            </tr>
                        </thead>
                        <tbody>
                            <template lwc:if={hasEmployees}>
                                <template for:each={employeeTableRows} for:item="row">
                                    <tr key={row.id}>
                                        <template for:each={row.cells} for:item="cell">
                                            <td key={cell.id} data-label={cell.label}>
                                                <div class={cell.valueClass} title={cell.value}>{cell.value}</div>
                                            </td>
                                        </template>
                                        <td data-label={labels.actionsTitle} class="company-employees__employees-table-actions">
                                            <div class="company-employees__actions-wrapper">
                                                <div class="company-employees__action-icon-buttons">
                                                    <lightning-button-icon
                                                        icon-name="utility:edit"
                                                        alternative-text={labels.editActionTitle}
                                                        title={labels.editActionTitle}
                                                        variant="border-filled"
                                                        data-id={row.id}
                                                        onclick={handleEditEmployee}
                                                    ></lightning-button-icon>
                                                    <lightning-button-icon
                                                        icon-name="utility:delete"
                                                        alternative-text={labels.deleteActionTitle}
                                                        title={labels.deleteActionTitle}
                                                        variant="border-filled"
                                                        data-id={row.id}
                                                        onclick={handleDeleteEmployee}
                                                    ></lightning-button-icon>
                                                </div>

                                                <div class="company-employees__action-text-buttons">
                                                    <lightning-button
                                                        label={labels.editActionTitle}
                                                        variant="neutral"
                                                        data-id={row.id}
                                                        onclick={handleEditEmployee}
                                                    ></lightning-button>
                                                    <lightning-button
                                                        label={labels.deleteActionTitle}
                                                        variant="destructive-text"
                                                        data-id={row.id}
                                                        onclick={handleDeleteEmployee}
                                                    ></lightning-button>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </template>

                            <template lwc:else>
                                <tr class="company-employees__employees-table-empty-row">
                                    <td colspan={employeeTableColspan} class="company-employees__employees-table-empty-cell">
                                        <div class="company-employees__empty-state-message">{emptyStateTitle}</div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </template>
    </div>
</template>
