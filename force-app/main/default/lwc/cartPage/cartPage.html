<template>
    <section class="cart-page">
        <div class="cart-page__shell">
            <div class="cart-page__content">
                <div class="cart-page__main">
                    <div class="cart-page__header">
                        <div>
                            <div class="cart-page__title">{cartTitle}</div>
                        </div>

                        <div class="cart-page__header-actions">

                        </div>
                    </div>

                    <div class="cart-page__toolbar">

                            <lightning-button
                                label="Clear Cart"
                                variant="destructive-text"
                                onclick={handleClearCart}
                            ></lightning-button>

                            <lightning-button
                                label="Add Product"
                                variant="brand"
                                onclick={handleOpenAddProductModal}
                            ></lightning-button>

                            <lightning-select
                                name="sortOrder"
                                label="Sort by"
                                value={sortOrder}
                                options={sortOptions}
                                onchange={handleSortChange}
                            ></lightning-select>
                    </div>

                    <template lwc:if={hasCartItems}>
                        <div class="cart-page__items">
                            <template for:each={cartItemRows} for:item="item">
                                <div key={item.id} class="cart-item">
                                    <div class="cart-item__media">{item.imageLabel}</div>

                                    <div class="cart-item__details">
                                        <div class="cart-item__meta">
                                            <div class="cart-item__name">{item.name}</div>
                                            <div class="cart-item__sku">SKU: {item.sku}</div>
                                        </div>

                                        <div class="cart-item__pricing">
                                            <div class="cart-item__price-label">Unit price</div>
                                            <div class="cart-item__price">{item.unitPriceFormatted}</div>
                                        </div>

                                        <div class="cart-item__quantity">
                                            <div class="cart-item__price-label">Quantity</div>
                                            <div class="cart-item__stepper">
                                                <button
                                                    class="cart-item__stepper-button"
                                                    type="button"
                                                    data-id={item.id}
                                                    onclick={handleDecreaseQuantity}
                                                >
                                                    -
                                                </button>
                                                <span class="cart-item__stepper-value">{item.quantity}</span>
                                                <button
                                                    class="cart-item__stepper-button"
                                                    type="button"
                                                    data-id={item.id}
                                                    onclick={handleIncreaseQuantity}
                                                >
                                                    +
                                                </button>
                                            </div>
                                        </div>

                                        <div class="cart-item__line-total">
                                            <div class="cart-item__price-label">Line total</div>
                                            <div class="cart-item__total">{item.lineTotalFormatted}</div>
                                        </div>
                                    </div>

                                    <lightning-button
                                        label="Delete"
                                        variant="destructive-text"
                                        data-id={item.id}
                                        onclick={handleDeleteItem}
                                    ></lightning-button>
                                </div>
                            </template>
                        </div>
                    </template>

                    <template lwc:else>
                        <div class="cart-page__empty-state">
                            <div class="cart-page__empty-title">Your cart is empty</div>
                            <div class="cart-page__empty-text">
                                Add a product to get started
                            </div>
                        </div>
                    </template>
                </div>

                <div class="cart-summary">
                    <div class="cart-summary__card">
                        <p class="cart-summary__title">Order summary</p>
                        <h2 class="cart-summary__subtitle">Totals</h2>

                        <div class="cart-summary__rows">
                            <template for:each={summaryRows} for:item="row">
                                <div key={row.id} class={row.className}>
                                    <span>{row.label}</span>
                                    <span>{row.value}</span>
                                </div>
                            </template>
                        </div>

                        <div class="cart-summary__actions">
                            <lightning-button
                                label="Proceed to Checkout"
                                variant="brand"
                                stretch
                            ></lightning-button>
                            <lightning-button
                                label="Continue Shopping"
                                variant="neutral"
                                stretch
                            ></lightning-button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <template lwc:if={isAddProductModalOpen}>
            <section class="cart-modal">
                <div class="cart-modal__backdrop" onclick={handleCloseAddProductModal}></div>

                <div class="cart-modal__dialog">
                    <div class="cart-modal__header">
                        <div>
                            <div class="cart-modal__title">Add Product</div>
                            <div class="cart-modal__subtitle">Choose a product to add to the cart</div>
                        </div>

                        <button
                            class="cart-modal__close"
                            type="button"
                            onclick={handleCloseAddProductModal}
                        >
                            x
                        </button>
                    </div>

                    <div class="cart-modal__body">
                        <lightning-input
                            type="search"
                            name="productSearch"
                            label="Search products"
                            value={productSearchTerm}
                            onchange={handleProductSearchChange}
                        ></lightning-input>

                        <template lwc:if={hasSuggestedProducts}>
                            <div class="cart-modal__list">
                                <template for:each={filteredSuggestedProducts} for:item="product">
                                    <div key={product.id} class="cart-modal__product">
                                        <div class="cart-modal__product-media">{product.imageLabel}</div>

                                        <div class="cart-modal__product-content">
                                            <div class="cart-modal__product-name">{product.name}</div>
                                            <div class="cart-modal__product-sku">SKU: {product.sku}</div>
                                            <div class="cart-modal__product-price">{product.unitPriceFormatted}</div>
                                        </div>

                                        <lightning-button
                                            label="Add to Cart"
                                            variant="brand"
                                            data-id={product.id}
                                            onclick={handleAddSuggestedProduct}
                                        ></lightning-button>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <template lwc:else>
                            <div class="cart-modal__empty">No products match your search</div>
                        </template>
                    </div>
                </div>
            </section>
        </template>
    </section>
</template>
